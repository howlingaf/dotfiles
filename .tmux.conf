set-environment -g PATH "$PATH"
# set true color?
set -as terminal-overrides ",*:Tc"

# Pass through modifier+key chords (Ctrl+Shift+anything, Ctrl+Enter, etc.) using
# the kitty/CSI-u encoding so nvim can distinguish them. Requires tmux 3.2+ and
# a terminal that supports the encoding (alacritty does since 0.13).
# `always` sends the extended encoding regardless of whether the inner app
# requested it; ensures it works even when nvim's auto-detect doesn't fire.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys,alacritty:extkeys'

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Tmux out of clipboard role; nvim handles OSC 52 directly.
set -g set-clipboard on

# Forward pane title (set by shell/nvim via OSC 2) to outer terminal title bar.
set -g set-titles on
set -g set-titles-string '#H:#S - #{pane_current_path}'

# cycle windows
bind-key h previous-window
bind-key l next-window

# set vi-mode
set-window-option -g mode-keys vi

# Bind a new window to prefix + c
bind-key c new-window -c "#{pane_current_path}"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Unbind Ctrl+c from the prefix
unbind-key -n C-c


# Load plugins first
run '~/.tmux/plugins/tpm/tpm'

# Reload binding
bind r source-file ~/.tmux.conf \; display "󰄉  tmux config reloaded!"
